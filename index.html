<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Bu? - Futbol Efsaneleri</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f1c40f;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #bdc3c7;
            margin-bottom: 30px;
        }
        
        /* Menü Ekranları */
        .screen { display: none; }
        .screen.active { display: block; }
        
        .menu-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            margin: 10px 0;
            background-color: #ecf0f1;
            color: #2c3e50;
            font-weight: bold;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background-color: #27ae60;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover { background-color: #2ecc71; transform: scale(1.02); }
        button.btn-secondary { background-color: #2980b9; }
        button.btn-secondary:hover { background-color: #3498db; }
        button.btn-danger { background-color: #c0392b; margin-top: 20px; }
        button.btn-danger:hover { background-color: #e74c3c; }

        #roomCodeDisplay {
            font-size: 32px;
            color: #f1c40f;
            letter-spacing: 5px;
            margin: 20px 0;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 10px;
        }

        /* Oyun Tahtası ve Üst Bar */
        #oyunUstBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ffcc;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        #gameStatus {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
            text-align: left;
        }

        #btnTahmin {
            background-color: #2ecc71;
            color: black;
            font-weight: 900;
            padding: 10px 20px;
            width: auto;
            margin: 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
            font-size: 18px;
            display: none; /* Oyun başlayana kadar gizli */
        }
        #btnTahmin:hover { transform: scale(1.05); }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background-color: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background-color: white;
        }
        
        .card .name {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            color: white;
            padding: 20px 5px 8px 5px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 2;
            text-align: center;
        }

        /* Kart Durumları */
        .card.my-player {
            border: 4px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.02);
        }
        
        .card.eliminated {
            opacity: 0.25;
            filter: grayscale(100%);
            transform: scale(0.95);
            border-color: #c0392b;
        }
        .card.eliminated .name { text-decoration: line-through; color: #e74c3c; }

        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            z-index: 999;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-direction: column;
        }

        /* TAHMİN SONUCU EKRANI */
        #resultOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 60px;
            font-weight: bold;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.9);
            pointer-events: none;
            backdrop-filter: blur(5px);
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #f1c40f;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SOHBET KUTUSU TASARIMI */
        #chat-container {
            margin: 20px auto 0 auto;
            max-width: 1200px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 250px;
        }
        #chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            text-align: left;
        }
        .msg-me { background: #27ae60; align-self: flex-end; color: white; }
        .msg-them { background: #2980b9; align-self: flex-start; color: white; border: 1px solid #3498db; }
        
        #chat-input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        #chat-input-area input { margin: 0; flex-grow: 1; text-align: left; }
        #chat-input-area button { margin: 0; width: auto; padding: 0 20px; background-color: #f1c40f; color: #2c3e50; }
        #chat-input-area button:hover { background-color: #f39c12; }

        @media (max-width: 900px) { .board { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 600px) { 
            .board { grid-template-columns: repeat(3, 1fr); gap: 10px; } 
            .card .name { font-size: 12px; padding: 15px 3px 5px 3px; }
            #gameStatus { font-size: 16px; }
            #btnTahmin { font-size: 14px; padding: 8px 12px; }
            #resultOverlay { font-size: 40px; }
        }
        @media (max-width: 400px) { .board { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <h1>Kim Bu? ⚽</h1>
    <div class="subtitle">Çevrimiçi Futbolcu Tahmin Oyunu</div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">Bekleniyor...</span>
    </div>

    <!-- TAHMİN SONUCU BİLDİRİMİ -->
    <div id="resultOverlay">
        <div id="resultText">KAZANDIN!</div>
    </div>

    <!-- ANA MENÜ -->
    <div id="screen-main" class="screen active">
        <div class="menu-box">
            <h2>Oyun Modu Seç</h2>
            <button onclick="showScreen('screen-host')">🏠 Yeni Oda Kur</button>
            <button class="btn-secondary" onclick="showScreen('screen-join')">🤝 Kodla Odaya Katıl</button>
        </div>
    </div>

    <!-- ODA KURMA EKRANI -->
    <div id="screen-host" class="screen">
        <div class="menu-box">
            <h2>Oda Ayarları</h2>
            <select id="kategoriSec">
                <option value="super_lig">Süper Lig</option>
                <option value="turk_efsaneler">Türk Efsaneler</option>
                <option value="dunya_efsaneler">Dünya Efsaneler</option>
                <option value="dunya_genel">Dünya Geneli</option> 
            </select>
            <button onclick="odaOlustur()">Odayı Başlat</button>
            <button class="btn-danger" onclick="showScreen('screen-main')">Geri Dön</button>
        </div>
    </div>

    <!-- KODLA KATILMA EKRANI -->
    <div id="screen-join" class="screen">
        <div class="menu-box">
            <h2>Odaya Katıl</h2>
            <input type="text" id="joinCode" placeholder="Oda Kodunu Gir (Örn: A7X9B)" maxlength="5" style="text-transform: uppercase;">
            <button class="btn-secondary" onclick="odayaKatil()">Bağlan</button>
            <button class="btn-danger" onclick="showScreen('screen-main')">Geri Dön</button>
        </div>
    </div>

    <!-- BEKLEME EKRANI (HOST İÇİN) -->
    <div id="screen-waiting" class="screen">
        <div class="menu-box">
            <h2>Oda Kuruldu!</h2>
            <p>Arkadaşına şu kodu gönder:</p>
            <div id="roomCodeDisplay">-----</div>
            <p style="color: #f1c40f;">Arkadaşın kodu girdiğinde oyun otomatik başlayacak...</p>
            <div class="spinner" style="margin: 20px auto;"></div>
        </div>
    </div>

    <!-- OYUN TAHTASI VE SOHBET -->
    <div id="screen-game" class="screen">
        <div id="oyunUstBar">
            <div id="gameStatus">SENİN OYUNCUN KİM? <br><span style="font-size:14px;color:#bdc3c7;">Önce kendi karakterini seçerek çerçeveye al.</span></div>
            <button id="btnTahmin" onclick="tahminModunuAcKapat()">TAHMİN ET</button>
        </div>
        
        <div class="board" id="oyunTahtasi"></div>
        
        <!-- MESAJLAŞMA KUTUSU -->
        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Buradan mesaj yaz..." onkeypress="chatEnterKontrol(event)">
                <button onclick="mesajGonder()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        const GITHUB_KULLANICI_ADIN = "mosalah11-cyber"; 
        const GITHUB_REPO_ADIN = "kim-bu-futbol";
        
        let peer = null;
        let conn = null;
        let myPlayerId = null;
        let opponentPlayerId = null;
        let gameState = "SELECT_PLAYER";
        let isGuessMode = false;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = "flex";
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = "none";
        }

        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function ismiDuzenle(dosyaAdi) {
            let isim = dosyaAdi.replace(/\.[^/.]+$/, ""); 
            isim = isim.replace(/_/g, " "); 
            return isim.replace(/\b\w/g, l => l.toUpperCase()); 
        }

        async function githubdanResimleriCek(klasor) {
            const url = `https://api.github.com/repos/${GITHUB_KULLANICI_ADIN}/${GITHUB_REPO_ADIN}/contents/images/${klasor}`;
            try {
                const yanit = await fetch(url);
                if (!yanit.ok) return [];
                const veri = await yanit.json();
                return veri
                    .filter(dosya => dosya.name.match(/\.(jpg|jpeg|png|webp)$/i))
                    .map(dosya => ({
                        isim: ismiDuzenle(dosya.name),
                        img: dosya.download_url,
                        id: Math.random().toString(36).substr(2, 9)
                    }));
            } catch (hata) {
                console.error("Resimler çekilemedi:", hata);
                return [];
            }
        }

        function diziyiKaristir(dizi) {
            let kopya = [...dizi];
            for (let i = kopya.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [kopya[i], kopya[j]] = [kopya[j], kopya[i]];
            }
            return kopya;
        }

        // ==========================================
        // HOST (ODA KURAN) İŞLEMLERİ
        // ==========================================
        async function odaOlustur() {
            const secilenKategori = document.getElementById("kategoriSec").value;
            const roomCode = generateRoomCode();
            
            showLoading("Kadro çekiliyor...");
            let tumOyuncular = await githubdanResimleriCek(secilenKategori);
            
            if (tumOyuncular.length === 0) {
                hideLoading();
                alert(`Hata: ${secilenKategori} klasöründe resim bulunamadı!`);
                return;
            }

            const oynanacakKadro = diziyiKaristir(tumOyuncular).slice(0, 20);
            
            showLoading("Oda sunucusu açılıyor...");
            peer = new Peer('kbfutbol-' + roomCode);
            
            peer.on('open', function(id) {
                hideLoading();
                showScreen('screen-waiting');
                document.getElementById('roomCodeDisplay').innerText = roomCode;
            });

            peer.on('connection', function(connection) {
                conn = connection;
                conn.on('open', function() {
                    conn.send({ type: 'KADRO', payload: oynanacakKadro });
                    tahtayiCiz(oynanacakKadro);
                });
                
                conn.on('data', gelenVeriyiIsle);
            });

            peer.on('error', function(err) {
                hideLoading();
                alert("Bağlantı hatası: " + err.type);
            });
        }

        // ==========================================
        // GUEST (KATILAN) İŞLEMLERİ
        // ==========================================
        function odayaKatil() {
            let code = document.getElementById("joinCode").value.toUpperCase().trim();
            if(code.length !== 5) {
                alert("Lütfen 5 haneli oda kodunu eksiksiz girin.");
                return;
            }

            showLoading("Odaya bağlanıyor...");
            peer = new Peer(); 
            
            peer.on('open', function(id) {
                conn = peer.connect('kbfutbol-' + code);
                
                conn.on('open', function() {
                    hideLoading();
                });

                conn.on('data', gelenVeriyiIsle);
            });

            peer.on('error', function(err) {
                hideLoading();
                alert("Oda bulunamadı veya bağlantı hatası!");
            });
        }

        // ==========================================
        // VERİ VE SOHBET İŞLEMLERİ
        // ==========================================
        function gelenVeriyiIsle(data) {
            if(data.type === 'KADRO') {
                tahtayiCiz(data.payload);
            } else if(data.type === 'CHAT') {
                mesajEkranaYazdir('Rakip', data.payload, 'msg-them');
            } else if(data.type === 'SELECTION') {
                opponentPlayerId = data.payload;
            }
        }

        function chatEnterKontrol(e) {
            if (e.key === 'Enter') {
                mesajGonder();
            }
        }

        function mesajGonder() {
            const input = document.getElementById('chat-input');
            const metin = input.value.trim();
            
            if(!metin || !conn) return;

            mesajEkranaYazdir('Sen', metin, 'msg-me');
            conn.send({ type: 'CHAT', payload: metin });
            input.value = '';
        }

        function mesajEkranaYazdir(gonderen, metin, cssSinifi) {
            const mesajKutusu = document.getElementById('chat-messages');
            const yeniMesaj = document.createElement('div');
            yeniMesaj.className = 'message ' + cssSinifi;
            yeniMesaj.innerHTML = `<strong>${gonderen}:</strong> ${metin}`;
            
            mesajKutusu.appendChild(yeniMesaj);
            mesajKutusu.scrollTop = mesajKutusu.scrollHeight;
        }

        // ==========================================
        // OYUN TAHTASI VE TAHMİN İŞLEMLERİ
        // ==========================================
        function tahtayiCiz(kadro) {
            showScreen('screen-game');
            const tahta = document.getElementById("oyunTahtasi");
            tahta.innerHTML = "";
            gameState = "SELECT_PLAYER";
            myPlayerId = null;
            opponentPlayerId = null;
            isGuessMode = false;
            
            document.getElementById("btnTahmin").style.display = "none";
            document.getElementById("gameStatus").innerHTML = "SENİN OYUNCUN KİM? <br><span style='font-size:14px;color:#bdc3c7;'>Önce kendi karakterini seçerek belirle.</span>";
            document.getElementById('chat-messages').innerHTML = ""; 

            kadro.forEach(oyuncu => {
                const kart = document.createElement("div");
                kart.className = "card";
                kart.id = "kart-" + oyuncu.id;
                
                kart.innerHTML = `
                    <img src="${oyuncu.img}" alt="${oyuncu.isim}">
                    <div class="name">${oyuncu.isim}</div>
                `;
                
                kart.onclick = () => kartTiklandi(kart);
                tahta.appendChild(kart);
            });
        }

        function tahminModunuAcKapat() {
            if(gameState !== "PLAYING") return;
            
            isGuessMode = !isGuessMode;
            const btn = document.getElementById("btnTahmin");
            
            if(isGuessMode) {
                btn.style.backgroundColor = "#e74c3c"; // İptal rengi (Kırmızı)
                btn.style.color = "white";
                btn.innerText = "İPTAL ET";
            } else {
                btn.style.backgroundColor = "#2ecc71"; // Normal renk (Yeşil)
                btn.style.color = "black";
                btn.innerText = "TAHMİN ET";
            }
        }

        function sonucGoster(mesaj, renk) {
            const overlay = document.getElementById("resultOverlay");
            document.getElementById("resultText").innerText = mesaj;
            overlay.style.backgroundColor = renk;
            overlay.style.display = "flex";
            
            setTimeout(() => {
                overlay.style.display = "none";
            }, 2500);
        }

        function kartTiklandi(kart) {
            if(gameState === "SELECT_PLAYER") {
                kart.classList.add("my-player");
                myPlayerId = kart.id;
                gameState = "PLAYING";
                
                // Karşı tarafa kendi seçtiğimiz adamı gizlice bildiriyoruz
                if(conn) {
                    conn.send({ type: 'SELECTION', payload: myPlayerId });
                }
                
                const status = document.getElementById("gameStatus");
                status.style.color = "#f1c40f";
                status.style.borderColor = "#f1c40f";
                status.innerHTML = "OYUN BAŞLADI! 🎮<br><span style='font-size:14px;color:#bdc3c7;'>Rakibine sorular sor, elenenleri kapat.</span>";
                
                // Tahmin butonunu görünür yap
                document.getElementById("btnTahmin").style.display = "block";
                return;
            }

            if(gameState === "PLAYING") {
                // Eğer tahmin butonuna basılmışsa, eleme yerine tahmin mekanizması çalışır
                if(isGuessMode) {
                    if(!opponentPlayerId) {
                        alert("Rakibin henüz karakterini seçmemiş, biraz bekle!");
                        tahminModunuAcKapat(); // Modu kapat
                        return;
                    }
                    
                    if(kart.id === opponentPlayerId) {
                        sonucGoster("KAZANDIN! 🎉", "rgba(46, 204, 113, 0.85)"); // Şeffaf Yeşil
                    } else {
                        sonucGoster("YANLIŞ! ❌", "rgba(231, 76, 60, 0.85)"); // Şeffaf Kırmızı
                    }
                    
                    tahminModunuAcKapat(); // Tıkladıktan sonra tahmin modunu sıfırla
                    return;
                }

                // Tahmin modu açık değilse normal eleme işlemi yapar
                kart.classList.toggle("eliminated");
            }
        }
    </script>
</body>
</html>
